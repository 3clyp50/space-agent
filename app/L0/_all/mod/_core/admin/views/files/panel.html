<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/admin/views/files/files.css" />
    <script type="module" src="/mod/_core/admin/views/files/store.js"></script>
  </head>
  <body>
    <div x-data class="admin-files-root">
      <template x-if="$store.adminFiles">
        <section
          class="admin-panel admin-files-panel"
          x-cloak
          x-init="$nextTick(() => $store.adminFiles.mount({ actionMenu: $refs.actionMenu, deleteDialog: $refs.deleteDialog, editorDialog: $refs.editorDialog, list: $refs.list, renameDialog: $refs.renameDialog }))"
          x-destroy="$store.adminFiles.unmount()"
        >
          <div class="admin-card admin-files-browser">
            <div class="admin-files-toolbar">
              <div class="admin-files-toolbar-row">
                <button
                  class="secondary-button admin-files-action admin-files-action--icon"
                  type="button"
                  :disabled="$store.adminFiles.isWorking || !$store.adminFiles.canGoUp"
                  @click="$store.adminFiles.navigateUp({ focusList: true })"
                  title="Go to parent folder"
                  aria-label="Go to parent folder"
                >
                  <x-icon>arrow_upward</x-icon>
                </button>

                <button
                  class="secondary-button admin-files-action admin-files-action--icon"
                  type="button"
                  :disabled="$store.adminFiles.isWorking"
                  @click="$store.adminFiles.navigateHome({ focusList: true })"
                  title="Go to home folder"
                  aria-label="Go to home folder"
                >
                  <x-icon>home</x-icon>
                </button>

                <div class="admin-files-path-input">
                  <x-icon>folder_open</x-icon>
                  <input
                    type="text"
                    spellcheck="false"
                    autocomplete="off"
                    x-model="$store.adminFiles.draftPath"
                    @keydown.enter.prevent="$store.adminFiles.submitDraftPath({ focusList: true })"
                  />
                </div>

                <button
                  class="secondary-button admin-files-action admin-files-action--icon"
                  type="button"
                  :disabled="$store.adminFiles.isWorking"
                  @click="$store.adminFiles.refresh({ focusList: true })"
                  title="Refresh current folder"
                  aria-label="Refresh current folder"
                >
                  <x-icon>refresh</x-icon>
                </button>
              </div>

              <template x-if="$store.adminFiles.hasClipboard">
                <div class="admin-files-summary-row admin-files-summary-row--clipboard">
                  <div class="admin-files-summary-copy">
                    <span class="admin-files-summary-label" x-text="$store.adminFiles.clipboardLabel"></span>
                    <span class="admin-files-summary-note" x-text="$store.adminFiles.clipboardPreviewText"></span>
                  </div>

                  <div class="admin-files-summary-actions">
                    <button
                      class="secondary-button admin-files-summary-action"
                      type="button"
                      :disabled="!$store.adminFiles.canPasteClipboard"
                      @click="$store.adminFiles.pasteClipboardIntoCurrentDirectory()"
                    >
                      <x-icon>content_paste</x-icon>
                      <span>Paste Here</span>
                    </button>

                    <button
                      class="secondary-button admin-files-summary-action"
                      type="button"
                      @click="$store.adminFiles.toggleClipboardExpanded()"
                    >
                      <x-icon x-text="$store.adminFiles.clipboardExpanded ? 'expand_less' : 'expand_more'"></x-icon>
                      <span x-text="$store.adminFiles.clipboardExpandedToggleLabel"></span>
                    </button>
                  </div>
                </div>
              </template>

              <template x-if="$store.adminFiles.hasClipboard && $store.adminFiles.clipboardExpanded">
                <div class="admin-files-clipboard-list">
                  <template x-for="item in $store.adminFiles.clipboardItems" :key="item.path">
                    <div class="admin-files-clipboard-item">
                      <div class="admin-files-clipboard-copy">
                        <span class="admin-files-clipboard-icon">
                          <x-icon x-text="item.isDirectory ? 'folder' : 'description'"></x-icon>
                        </span>
                        <span class="admin-files-clipboard-text">
                          <span class="admin-files-clipboard-name" x-text="item.name"></span>
                          <span class="admin-files-clipboard-path" x-text="item.path"></span>
                        </span>
                      </div>

                      <button
                        class="secondary-button admin-files-mini-action"
                        type="button"
                        @click="$store.adminFiles.removeClipboardItem(item.path)"
                        :title="`Remove ${item.name} from ${$store.adminFiles.clipboardActionLabel.toLowerCase()}`"
                      >
                        <x-icon>close</x-icon>
                      </button>
                    </div>
                  </template>
                </div>
              </template>

              <template x-if="$store.adminFiles.hasSelection">
                <div class="admin-files-summary-row admin-files-summary-row--selection">
                  <div class="admin-files-summary-copy">
                    <span class="admin-files-summary-label" x-text="$store.adminFiles.selectionLabel"></span>
                    <span class="admin-files-summary-note" x-text="$store.adminFiles.selectionPreviewText"></span>
                  </div>

                  <div class="admin-files-summary-actions">
                    <button
                      class="secondary-button admin-files-summary-action admin-files-summary-action--icon"
                      type="button"
                      :disabled="$store.adminFiles.isWorking"
                      @click.stop="$store.adminFiles.toggleActionMenuForSelection($event)"
                      title="Selection actions"
                    >
                      <x-icon>more_horiz</x-icon>
                    </button>

                    <button
                      class="secondary-button admin-files-summary-action admin-files-summary-action--icon"
                      type="button"
                      :disabled="$store.adminFiles.isWorking"
                      @click="$store.adminFiles.clearSelection({ focusList: true })"
                      title="Clear selection"
                    >
                      <x-icon>close</x-icon>
                    </button>
                  </div>
                </div>
              </template>

              <template x-if="$store.adminFiles.noticeText">
                <div
                  class="admin-files-notice"
                  :class="{ 'is-error': $store.adminFiles.noticeTone === 'error' }"
                >
                  <x-icon x-text="$store.adminFiles.noticeTone === 'error' ? 'error' : 'info'"></x-icon>
                  <span x-text="$store.adminFiles.noticeText"></span>
                </div>
              </template>
            </div>

            <div
              class="admin-files-list"
              x-ref="list"
              tabindex="0"
              role="listbox"
              :aria-activedescendant="$store.adminFiles.activeDescendantId"
              :aria-busy="String($store.adminFiles.loading)"
              @keydown="$store.adminFiles.handleListKeydown($event)"
              @scroll="$store.adminFiles.captureScroll()"
            >
              <template x-if="$store.adminFiles.loading && !$store.adminFiles.entries.length">
                <div class="admin-files-empty">
                  <x-icon>hourglass_empty</x-icon>
                  <p>Loading folder...</p>
                  <p>Please wait while the browser reads the current path.</p>
                </div>
              </template>

              <template x-if="!$store.adminFiles.loading && $store.adminFiles.errorTitle">
                <div class="admin-files-empty is-warning">
                  <x-icon>error</x-icon>
                  <p x-text="$store.adminFiles.errorTitle"></p>
                  <p x-text="$store.adminFiles.errorDetail"></p>
                </div>
              </template>

              <template x-if="!$store.adminFiles.loading && !$store.adminFiles.errorTitle && !$store.adminFiles.entries.length">
                <div class="admin-files-empty">
                  <x-icon>folder_off</x-icon>
                  <p>This folder is empty.</p>
                  <p>No readable files or subfolders were returned for the current path.</p>
                </div>
              </template>

              <template x-for="entry in $store.adminFiles.entries" :key="entry.path">
                <div
                  :id="$store.adminFiles.getEntryDomId(entry.path)"
                  class="admin-files-entry"
                  :class="{
                    'is-checked': $store.adminFiles.isSelected(entry.path),
                    'is-highlighted': $store.adminFiles.highlightedPath === entry.path
                  }"
                  :aria-selected="String($store.adminFiles.highlightedPath === entry.path)"
                  role="option"
                >
                  <button
                    class="admin-files-entry-toggle"
                    type="button"
                    tabindex="-1"
                    :disabled="$store.adminFiles.isWorking"
                    :title="`${$store.adminFiles.isSelected(entry.path) ? 'Unselect' : 'Select'} ${entry.name}`"
                    @click.stop="$store.adminFiles.toggleSelection(entry.path, { focusList: true, scrollIntoView: false })"
                  >
                    <x-icon x-text="$store.adminFiles.isSelected(entry.path) ? 'check_box' : 'check_box_outline_blank'"></x-icon>
                  </button>

                  <button
                    class="admin-files-entry-main"
                    type="button"
                    tabindex="-1"
                    :title="entry.path"
                    @click="$store.adminFiles.selectEntry(entry.path, { focusList: true })"
                    @dblclick="$store.adminFiles.handleEntryDoubleClick(entry.path, { focusList: true })"
                  >
                    <span class="admin-files-entry-icon">
                      <x-icon x-text="entry.icon"></x-icon>
                    </span>

                    <span class="admin-files-entry-copy">
                      <span class="admin-files-entry-name" x-text="entry.name"></span>
                      <span class="admin-files-entry-path" x-text="entry.path"></span>
                    </span>
                  </button>

                  <button
                    x-show="!$store.adminFiles.hasSelection"
                    class="secondary-button admin-files-entry-action"
                    type="button"
                    tabindex="-1"
                    :disabled="$store.adminFiles.isWorking"
                    :title="`Actions for ${entry.name}`"
                    @click.stop="$store.adminFiles.toggleActionMenuForEntry(entry.path, $event)"
                  >
                    <x-icon>more_horiz</x-icon>
                  </button>
                </div>
              </template>
            </div>
          </div>

          <template x-teleport="body">
            <div class="space-popover-layer" x-show="$store.adminFiles.isActionMenuOpen" x-cloak>
              <div
                class="space-popover-panel admin-files-action-menu"
                x-ref="actionMenu"
                x-show="$store.adminFiles.isActionMenuOpen"
                :style="$store.adminFiles.actionMenuStyle"
                @click.outside="$store.adminFiles.closeActionMenu()"
                @keydown.escape.window="$store.adminFiles.closeActionMenu()"
              >
                <template x-for="action in $store.adminFiles.actionMenuActions" :key="action.id">
                  <button
                    type="button"
                    class="space-popover-action"
                    :class="{ 'is-danger': action.danger }"
                    @click="$store.adminFiles.submitActionMenuAction(action.id)"
                  >
                    <x-icon x-text="action.icon"></x-icon>
                    <span class="space-popover-action-label" x-text="action.label"></span>
                  </button>
                </template>
              </div>
            </div>
          </template>

          <template x-teleport="body">
            <div class="space-dialog-layer">

              <dialog class="chat-dialog" x-ref="renameDialog" @cancel.prevent="$store.adminFiles.closeRenameDialog()">
                <form method="dialog" class="dialog-card admin-files-dialog-card" @submit.prevent="$store.adminFiles.submitRenameDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">File Browser</p>
                      <h2 x-text="$store.adminFiles.renameDialogTitle"></h2>
                    </div>
                  </header>

                  <label class="field">
                    <span>Name</span>
                    <input type="text" autocomplete="off" x-model="$store.adminFiles.renameDraftName" />
                  </label>

                  <template x-if="$store.adminFiles.renameDialogError">
                    <p class="dialog-note admin-files-dialog-note is-error" x-text="$store.adminFiles.renameDialogError"></p>
                  </template>

                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.adminFiles.closeRenameDialog()">Cancel</button>
                    <button type="submit" class="confirm-button" :disabled="$store.adminFiles.renameDialogSaving">
                      <span x-text="$store.adminFiles.renameDialogSaving ? 'Saving...' : 'Rename'"></span>
                    </button>
                  </div>
                </form>
              </dialog>

              <dialog class="chat-dialog" x-ref="deleteDialog" @cancel.prevent="$store.adminFiles.closeDeleteDialog()">
                <form method="dialog" class="dialog-card admin-files-dialog-card" @submit.prevent="$store.adminFiles.submitDeleteDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">File Browser</p>
                      <h2>Deletion confirmation</h2>
                    </div>
                  </header>

                  <div class="admin-files-delete-preview">
                    <template x-for="entry in $store.adminFiles.deleteDialogEntries" :key="entry.path">
                      <div class="admin-files-delete-preview-item">
                        <x-icon x-text="entry.isDirectory ? 'folder' : 'description'"></x-icon>
                        <span class="admin-files-delete-preview-copy">
                          <span class="admin-files-delete-preview-name" x-text="entry.name"></span>
                          <span class="admin-files-delete-preview-path" x-text="entry.path"></span>
                        </span>
                      </div>
                    </template>
                  </div>

                  <template x-if="$store.adminFiles.deleteDialogError">
                    <p class="dialog-note admin-files-dialog-note is-error" x-text="$store.adminFiles.deleteDialogError"></p>
                  </template>

                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.adminFiles.closeDeleteDialog()">Cancel</button>
                    <button type="submit" class="secondary-button danger" :disabled="$store.adminFiles.deleteDialogSaving">
                      <span x-text="$store.adminFiles.deleteDialogSaving ? 'Removing...' : 'Remove'"></span>
                    </button>
                  </div>
                </form>
              </dialog>

              <dialog class="chat-dialog" x-ref="editorDialog" @cancel.prevent="$store.adminFiles.closeEditorDialog()">
                <form method="dialog" class="dialog-card dialog-card-raw admin-files-dialog-card" @submit.prevent="$store.adminFiles.submitEditorDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">File Browser</p>
                      <h2 x-text="$store.adminFiles.editorDialogTitle"></h2>
                    </div>
                  </header>

                  <p class="dialog-note">
                    <code x-text="$store.adminFiles.editorDialogPath || '[No file selected]'"></code>
                  </p>

                  <label class="field">
                    <span>Contents</span>
                    <textarea
                      rows="18"
                      spellcheck="false"
                      :disabled="$store.adminFiles.editorDialogLoading || $store.adminFiles.editorDialogSaving"
                      x-model="$store.adminFiles.editorDraftContent"
                    ></textarea>
                  </label>

                  <template x-if="$store.adminFiles.editorDialogLoading">
                    <p class="dialog-note">Loading file contents...</p>
                  </template>

                  <template x-if="$store.adminFiles.editorDialogError">
                    <p class="dialog-note admin-files-dialog-note is-error" x-text="$store.adminFiles.editorDialogError"></p>
                  </template>

                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.adminFiles.closeEditorDialog()">Cancel</button>
                    <button
                      type="submit"
                      class="confirm-button"
                      :disabled="$store.adminFiles.editorDialogLoading || $store.adminFiles.editorDialogSaving"
                    >
                      <span x-text="$store.adminFiles.editorDialogSaving ? 'Saving...' : 'Save'"></span>
                    </button>
                  </div>
                </form>
              </dialog>
            </div>
          </template>
        </section>
      </template>
    </div>
  </body>
</html>
